# Datasource, Redis e NATS usam variáveis de ambiente. Defaults = localhost (dev/compose com app no host).
# Em produção: defina DB_HOST, DB_PORT, DB_NAME, DB_USER, DB_PASSWORD, REDIS_HOST, REDIS_PORT, NATS_SERVER.
# Se o app rodar dentro do mesmo compose (rede Docker): DB_HOST=postgres, REDIS_HOST=redis, NATS_SERVER=nats://nats:4222
spring:
  application:
    name: routing-engine

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:routing}
    username: ${DB_USER:routing}
    password: ${DB_PASSWORD:routing}
    hikari:
      maximum-pool-size: 20

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.spatial.dialect.postgis.PostgisPG10Dialect
        jdbc.batch_size: 500
        order_inserts: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2s

nats:
  spring:
    server: ${NATS_SERVER:nats://localhost:4222}

routing:
  graphhopper:
    local: ${GRAPHHOPPER_LOCAL:true}
    osm-file: ${GRAPHHOPPER_OSM_FILE:data/brazil-latest.osm.pbf}
    graph-location: ${GRAPHHOPPER_GRAPH_LOCATION:data/graph-cache}
    s3:
      bucket: ${GRAPHHOPPER_S3_BUCKET:routing-data}
      prefix: ${GRAPHHOPPER_S3_PREFIX:graphhopper/brazil-latest}

  optimization:
    cluster-size: 150
    time-budget-ms: 8000
    two-opt-enabled: true
    parallelism: ${ROUTING_PARALLELISM:0}
    k-nearest-matrix: 15
    k-nearest-blossom: 7
    cache:
      l1-ttl-ms: 300000
      l2-ttl-seconds: 900

  eta:
    ewma-alpha: 0.25
    min-speed-mps: 1.0
    max-speed-mps: 45.0
    signal-timeout-seconds: 20

  deviation:
    urban-threshold-meters: 40
    highway-threshold-meters: 80

  throttle:
    min-interval-seconds: 30
    max-recalc-per-minute: 2

  arrival:
    radius-meters: 20

  inactivity:
    vehicle-stopped-seconds: 120
    vehicle-abandoned-seconds: 3600

  ingestion:
    dedup-window-minutes: 2
    max-batch-size: 50
    rate-limit-per-vehicle-per-second: 20

  retry:
    max-attempts: 3
    backoff-base-ms: 1000
    backoff-multiplier: 4

  incident:
    default-zoom: 14
    rate-limit-per-minute: 5
    expire-check-ms: 60000

resilience4j:
  circuitbreaker:
    instances:
      routeOptimization:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
        slidingWindowType: COUNT_BASED

aws:
  region: ${AWS_REGION:sa-east-1}
  access-key-id: ${AWS_ACCESS_KEY_ID:}
  secret-access-key: ${AWS_SECRET_ACCESS_KEY:}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    tags:
      application: routing-engine
